set -g mouse on

# Deep scrollback. Applies to panes created AFTER load — live seats keep their
# old limit until respawned/rolled.
set -g history-limit 100000

# Ergonomic prefix. Ctrl-a replaces tmux's default Ctrl-b; press Ctrl-a twice
# to pass a literal Ctrl-a through to the shell/application.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# True color / 256-color passthrough — Claude Code TUI needs both.
# Without these, panes fall back to tmux-256color and render monochrome.
set -g default-terminal "xterm-256color"
set -g terminal-overrides ",xterm-256color:Tc"

# Aura readability: tmux is the live workstream surface.
#
# The full spoken handle is the Aura address:
#   #{session_name}:#{window_name}  =>  fleet:seat
#
# Keep that visible even when the window list is crowded.
set -g automatic-rename off
set -g allow-rename off
set -g status on
set -g status 2
set -g status-position top
set -g status-interval 15
set -g status-left-length 100
set -g status-right-length 80
set -g status-left "#[bold,fg=colour81]#{session_name}#[default] "
set -g status-right "#[fg=colour250]#{pane_current_path} #[fg=colour244]%H:%M "
set -g status-format[0] "#[align=centre]#[bold,fg=colour81]#{session_name}#[default]"
set -g status-format[1] "#[align=centre]#{@aura_roster_seats_row1}"
set -g status-format[2] "#[align=centre]#{@aura_roster_seats_row2}"
set -g window-status-format ""
set -g window-status-current-format ""
set -g window-status-separator ""
set -g status-style "bg=colour235,fg=colour250"
set -g message-style "bg=colour235,fg=colour81"
set -g window-status-style "fg=colour250,bg=colour235"
set -g window-status-current-style "fg=colour16,bg=colour220,bold"
set -g pane-border-status off
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour240"
set -g pane-border-format "#[align=centre]#[fg=colour109]#{@aura_active_border}#[default]"

# Keep the Aura roster responsive without running Python/JSON reads directly in
# tmux's status redraw path.
set-hook -g after-new-window 'run-shell -b "#{E:HOME}/.local/bin/tmux-aura-roster-refresh \"#{session_name}\""'
set-hook -g after-rename-window 'run-shell -b "#{E:HOME}/.local/bin/tmux-aura-roster-refresh \"#{session_name}\""'
set-hook -g after-select-window 'run-shell -b "#{E:HOME}/.local/bin/tmux-aura-roster-refresh \"#{session_name}\""'
set-hook -g client-session-changed 'run-shell -b "#{E:HOME}/.local/bin/tmux-aura-roster-refresh \"#{session_name}\""'
set-hook -g client-resized 'run-shell -b "#{E:HOME}/.local/bin/tmux-aura-roster-refresh \"#{session_name}\""'
set-hook -g window-linked 'run-shell -b "#{E:HOME}/.local/bin/tmux-aura-roster-refresh \"#{session_name}\""'
set-hook -g window-unlinked 'run-shell -b "#{E:HOME}/.local/bin/tmux-aura-roster-refresh \"#{session_name}\""'

# Aura seat controls. Every binding resolves the CURRENT PANE's seat by exact
# pane id (%N) through tmux-aura-seat-op — never by window name, which is only
# a label. Results (or fail-closed refusal reasons) show in the message line.
bind-key u run-shell -b '#{E:HOME}/.local/bin/tmux-aura-copy-identity'
bind-key i run-shell -b '#{E:HOME}/.local/bin/tmux-aura-show-identity'
bind-key U run-shell -b '#{E:HOME}/.local/bin/tmux-aura-copy-fleet'
bind-key r run-shell -b '#{E:HOME}/.local/bin/tmux-aura-seat-op rollover'
bind-key R run-shell -b '#{E:HOME}/.local/bin/tmux-aura-seat-op restart'
# cut kills the seat — one confirm keeps a fat-finger from retiring a colleague.
bind-key x confirm-before -p "cut this pane's seat? (y/n)" "run-shell -b '#{E:HOME}/.local/bin/tmux-aura-seat-op cut'"
bind-key N command-prompt -p "rename seat to:" "run-shell -b '#{E:HOME}/.local/bin/tmux-aura-seat-op rename \"%1\"'"
bind-key S command-prompt -p "spawn seat (name [runtime]):" "run-shell -b '#{E:HOME}/.local/bin/tmux-aura-seat-op spawn \"%1\"'"
bind-key A command-prompt -p "adopt this pane as seat:" "run-shell -b '#{E:HOME}/.local/bin/tmux-aura-seat-op adopt \"%1\"'"
# Prefix + f/y copy this pane's resolved Aura identity.
bind-key f run-shell -b '#{E:HOME}/.local/bin/tmux-aura-copy-identity'
bind-key y run-shell -b '#{E:HOME}/.local/bin/tmux-aura-copy-identity'

# Mouse toggle. ON = tmux owns the mouse (click-select panes, drag-resize, fast
# copy-mode wheel; Claude's wheel is flattened + multiplied). OFF = the terminal
# sends the wheel straight to the focused app, so Claude scrolls at its native
# accelerated speed — at the cost of tmux's own mouse. prefix-m flips it.
bind-key m set -g mouse \; display-message "mouse #{?mouse,ON (tmux owns wheel),OFF (app owns wheel)}"

# Right-click resolves the clicked pane's visible text to its runtime
# transcript message: popup + tmux buffer + optional one-line annotation
# (appended to ~/.aura/notes/annotations.jsonl). -t= keys every #{...}
# format off the CLICKED pane — without it they expand against the active
# pane and resolve the wrong seat (tmux-resolver-260522-2005 finding).
bind-key -n MouseDown3Pane run-shell -b -t= '#{E:HOME}/.local/bin/tmux-aura-resolve-click "#{pane_id}" word-window "#{mouse_y}" "#{q:mouse_word}" "#{mouse_x}" 10'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize tpm (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'

# Reclaim Aura keys after TPM so plugin defaults do not steal them.
unbind-key U
bind-key U run-shell -b '#{E:HOME}/.local/bin/tmux-aura-copy-fleet'
unbind-key r
bind-key r run-shell -b '#{E:HOME}/.local/bin/tmux-aura-seat-op rollover'
unbind-key R
bind-key R run-shell -b '#{E:HOME}/.local/bin/tmux-aura-seat-op restart'
unbind-key x
bind-key x confirm-before -p "cut this pane's seat? (y/n)" "run-shell -b '#{E:HOME}/.local/bin/tmux-aura-seat-op cut'"
unbind-key N
bind-key N command-prompt -p "rename seat to:" "run-shell -b '#{E:HOME}/.local/bin/tmux-aura-seat-op rename \"%1\"'"
unbind-key S
bind-key S command-prompt -p "spawn seat (name [runtime]):" "run-shell -b '#{E:HOME}/.local/bin/tmux-aura-seat-op spawn \"%1\"'"
unbind-key A
bind-key A command-prompt -p "adopt this pane as seat:" "run-shell -b '#{E:HOME}/.local/bin/tmux-aura-seat-op adopt \"%1\"'"
unbind-key -n MouseDown3Pane
bind-key -n MouseDown3Pane run-shell -b -t= '#{E:HOME}/.local/bin/tmux-aura-resolve-click "#{pane_id}" word-window "#{mouse_y}" "#{q:mouse_word}" "#{mouse_x}" 10'

# Wheel speed, two regimes:
#  - tmux's own copy-mode (shell panes): 20 lines per tick; the first tick both
#    enters copy-mode and scrolls.
#  - mouse-grabbing TUIs (claude, codex): tmux can't change their internal
#    scroll step, but it CAN deliver more wheel events per physical tick. Each
#    `send-keys -M` re-emits the triggering wheel event to the app, so three of
#    them = 3x the app's own scroll distance per tick. Bump the count below if
#    you want it to fly; lower it if a fast TUI repaints janky.
bind -T copy-mode-vi WheelUpPane   send-keys -X -N 20 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 20 scroll-down
bind -T copy-mode    WheelUpPane   send-keys -X -N 20 scroll-up
bind -T copy-mode    WheelDownPane send-keys -X -N 20 scroll-down
bind -T root WheelUpPane   if -F "#{mouse_any_flag}" { send-keys -M ; send-keys -M ; send-keys -M ; send-keys -M ; send-keys -M ; send-keys -M } { copy-mode -e ; send-keys -X -N 20 scroll-up }
bind -T root WheelDownPane if -F "#{mouse_any_flag}" { send-keys -M ; send-keys -M ; send-keys -M ; send-keys -M ; send-keys -M ; send-keys -M } { send-keys -M }
